apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-final
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: todo-api
        metrics_path: /metrics
        static_configs:
          - targets: ["todo-api.devops-final.svc.cluster.local:80"]

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
